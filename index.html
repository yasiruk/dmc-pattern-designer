<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMC Pattern Designer</title>
<style>
  :root {
    --bg: #f4f4f2;
    --panel: #ffffff;
    --border: #d5d5d0;
    --ink: #222;
    --accent: #2b7a5b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 18px;
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  header h1 { font-size: 18px; margin: 0; }
  header .sub { font-size: 12px; color: #888; }

  .layout {
    display: flex;
    gap: 16px;
    padding: 16px;
    align-items: flex-start;
  }
  .sidebar {
    width: 300px;
    flex: 0 0 300px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    position: sticky;
    top: 16px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }
  .main { flex: 1; min-width: 0; }

  fieldset {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin: 0 0 14px;
    padding: 10px 12px;
  }
  legend { font-size: 12px; font-weight: 600; color: #555; padding: 0 4px; }

  label.row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 6px 0; font-size: 13px; }
  input[type="number"] { width: 70px; padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px; }
  input[type="text"] { width: 100%; padding: 5px 6px; border: 1px solid var(--border); border-radius: 4px; }

  button {
    font: inherit;
    padding: 6px 10px;
    border: 1px solid var(--border);
    background: #fafafa;
    border-radius: 5px;
    cursor: pointer;
  }
  button:hover { background: #f0f0f0; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { filter: brightness(1.05); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 6px; }

  .tool-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .tool-row button.active { outline: 2px solid var(--accent); }

  .search-wrap { margin-bottom: 8px; }
  .palette {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(34px, 1fr));
    gap: 4px;
    max-height: 240px;
    overflow-y: auto;
    padding: 2px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .swatch {
    aspect-ratio: 1;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,.2);
    cursor: pointer;
    position: relative;
    font-size: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(0,0,0,.55);
  }
  .swatch.sel { outline: 3px solid var(--accent); z-index: 1; }
  .palette.recent { max-height: none; grid-template-columns: repeat(auto-fill, minmax(30px, 1fr)); }

  .current {
    display: flex; align-items: center; gap: 10px;
    margin: 8px 0; font-size: 13px;
  }
  .current .chip { width: 30px; height: 30px; border-radius: 5px; border: 1px solid rgba(0,0,0,.25); }

  .grid-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow: auto;
  }
  #grid {
    display: grid;
    border-top: 1px solid #bbb;
    border-left: 1px solid #bbb;
    width: max-content;
    user-select: none;
    touch-action: none;
  }
  .cell {
    border-right: 1px solid #e5e5e5;
    border-bottom: 1px solid #e5e5e5;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: rgba(0,0,0,.55);
  }
  /* every 10th line darker */
  .cell.major-r { border-right: 1px solid #999; }
  .cell.major-b { border-bottom: 1px solid #999; }
  .cell.sel-region { box-shadow: inset 0 0 0 200px rgba(43,122,91,.28); }

  .legend-print, .grid-title-print { display: none; }

  /* ---------- PRINT ---------- */
  @page { size: A4; margin: 12mm; }
  @media print {
    body { background: #fff; }
    header, .sidebar, .no-print { display: none !important; }
    .layout { padding: 0; display: block; }
    .grid-wrap { border: none; padding: 0; overflow: visible; }
    .grid-title-print { display: block; font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    #grid { break-inside: avoid; }
    .cell { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .legend-print {
      display: block;
      margin-top: 14px;
      break-inside: avoid;
    }
    .legend-print h2 { font-size: 13px; margin: 0 0 6px; }
    .legend-print table { border-collapse: collapse; font-size: 11px; }
    .legend-print td { border: 1px solid #999; padding: 2px 6px; }
    .legend-print .sw {
      display: inline-block; width: 14px; height: 14px;
      border: 1px solid #666; vertical-align: middle;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
  }
</style>
</head>
<body>
<header>
  <h1>DMC Pattern Designer</h1>
  <span class="sub">Design a cross-stitch chart with DMC floss colours · print to A4</span>
</header>

<div class="layout">
  <aside class="sidebar no-print">
    <fieldset>
      <legend>Canvas</legend>
      <label class="row">Width (stitches) <input type="number" id="cols" min="1" max="120" value="40"></label>
      <label class="row">Height (stitches) <input type="number" id="rows" min="1" max="120" value="40"></label>
      <label class="row">Cell size (px) <input type="number" id="cellsize" min="6" max="40" value="16"></label>
      <label class="row">Fabric count (per inch)
        <select id="count">
          <option value="6">6 ct</option>
          <option value="11">11 ct (Aida)</option>
          <option value="14" selected>14 ct (Aida)</option>
          <option value="16">16 ct (Aida)</option>
          <option value="18">18 ct (Aida)</option>
          <option value="22">22 ct (Hardanger)</option>
          <option value="25">25 ct (evenweave)</option>
          <option value="28">28 ct (linen)</option>
          <option value="32">32 ct (linen)</option>
          <option value="36">36 ct (linen)</option>
        </select>
      </label>
      <label class="row">Stitch over <select id="over"><option value="1" selected>1 thread</option><option value="2">2 threads</option></select></label>
      <div id="finished" style="font-size:12px;color:#555;margin:6px 0"></div>
      <label class="row">Show symbols <input type="checkbox" id="showsym"></label>
      <div class="btn-row" style="margin-top:8px">
        <button id="resize" class="primary">Apply size</button>
        <button id="clear">Clear all</button>
      </div>
    </fieldset>

    <fieldset>
      <legend>Tools</legend>
      <div class="tool-row">
        <button id="tool-paint" class="active">✏️ Paint</button>
        <button id="tool-erase">🧽 Erase</button>
        <button id="tool-fill">🪣 Fill</button>
        <button id="tool-select">⬚ Select</button>
      </div>
      <div class="tool-row">
        <button id="undo" title="Undo (⌘/Ctrl+Z)" disabled>↶ Undo</button>
        <button id="redo" title="Redo (⌘/Ctrl+Shift+Z)" disabled>↷ Redo</button>
        <button id="copy" title="Copy region (⌘/Ctrl+C)" disabled>⧉ Copy</button>
        <button id="paste" title="Paste (⌘/Ctrl+V)" disabled>📋 Paste</button>
      </div>
      <div id="hint" style="font-size:11px;color:#888;min-height:14px;margin-bottom:6px"></div>
      <div class="current">
        <span class="chip" id="currentChip"></span>
        <span id="currentLabel">Pick a colour</span>
      </div>
    </fieldset>

    <fieldset>
      <legend>DMC palette</legend>
      <div id="recentWrap" style="display:none;margin-bottom:8px">
        <div style="font-size:11px;color:#888;margin-bottom:3px">Recently used</div>
        <div class="palette recent" id="recent"></div>
      </div>
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search DMC # or name…">
      </div>
      <div class="palette" id="palette"></div>
    </fieldset>

    <fieldset>
      <legend>Project</legend>
      <label class="row" style="justify-content:flex-start;gap:8px">Title <input type="text" id="title" placeholder="My pattern"></label>
      <div class="btn-row">
        <button id="print" class="primary">🖨️ Print A4</button>
        <button id="save">💾 Save</button>
        <button id="load">📂 Load</button>
      </div>
      <input type="file" id="loadfile" accept="application/json" style="display:none">
    </fieldset>
  </aside>

  <main class="main">
    <div class="grid-wrap">
      <div class="grid-title-print" id="printTitle"></div>
      <div id="grid"></div>
      <div class="legend-print" id="legend"></div>
    </div>
  </main>
</div>

const SYMBOLS = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz0123456789@#$%&*+=<>?".split("");

/* ---------- State ---------- */
let cols = 40, rows = 40, cellSize = 16;
let count = 14, over = 1;
let showSym = false;
let tool = "paint";
let current = null; // {code,name,hex}
let data = [];      // data[r][c] = index into DMC or null

function initData(preserve) {
  const old = data;
  data = [];
  for (let r = 0; r < rows; r++) {
    data[r] = [];
    for (let c = 0; c < cols; c++) {
      data[r][c] = (preserve && old[r] && old[r][c] != null) ? old[r][c] : null;
    }
  }
}

/* ---------- Undo / redo history ---------- */
let undoStack = [], redoStack = [];
const HISTORY_LIMIT = 100;

function snapshot() {
  return { cols, rows, data: data.map(row => row.slice()) };
}
function pushHistory() {
  undoStack.push(snapshot());
  if (undoStack.length > HISTORY_LIMIT) undoStack.shift();
  redoStack = [];
  updateHistoryButtons();
}
function resetHistory() {
  undoStack = []; redoStack = [];
  updateHistoryButtons();
}
function restore(s) {
  cols = s.cols; rows = s.rows;
  data = s.data.map(row => row.slice());
  document.getElementById("cols").value = cols;
  document.getElementById("rows").value = rows;
  buildGrid();
  updateFinished();
  updateLegend();
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(snapshot());
  restore(undoStack.pop());
  updateHistoryButtons();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(snapshot());
  restore(redoStack.pop());
  updateHistoryButtons();
}
function updateHistoryButtons() {
  document.getElementById("undo").disabled = !undoStack.length;
  document.getElementById("redo").disabled = !redoStack.length;
}
document.getElementById("undo").onclick = undo;
document.getElementById("redo").onclick = redo;
window.addEventListener("keydown", e => {
  const tag = (e.target.tagName || "").toLowerCase();
  if (tag === "input" || tag === "select" || tag === "textarea") return;
  if (e.key === "Escape") {
    if (pasteMode) exitPasteMode();
    else if (selection) clearSelection();
    return;
  }
  const mod = e.metaKey || e.ctrlKey;
  if (!mod) return;
  const k = e.key.toLowerCase();
  if (k === "z" && !e.shiftKey) { e.preventDefault(); undo(); }
  else if ((k === "z" && e.shiftKey) || k === "y") { e.preventDefault(); redo(); }
  else if (k === "c") { if (selection) { e.preventDefault(); copySelection(); } }
  else if (k === "v") { if (clipboard) { e.preventDefault(); enterPasteMode(); } }
});

/* ---------- Rendering ---------- */
const gridEl = document.getElementById("grid");

function contrastText(hex) {
  const n = hex.replace("#","");
  const r = parseInt(n.slice(0,2),16), g = parseInt(n.slice(2,4),16), b = parseInt(n.slice(4,6),16);
  const lum = (0.299*r + 0.587*g + 0.114*b);
  return lum > 150 ? "rgba(0,0,0,.6)" : "rgba(255,255,255,.85)";
}

function buildGrid() {
  exitPasteMode();
  clearSelection();
  gridEl.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
  gridEl.innerHTML = "";
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.style.width = cellSize + "px";
      cell.style.height = cellSize + "px";
      if ((c + 1) % 10 === 0) cell.classList.add("major-r");
      if ((r + 1) % 10 === 0) cell.classList.add("major-b");
      cell.dataset.r = r;
      cell.dataset.c = c;
      gridEl.appendChild(cell);
    }
  }
  paintAll();
}

function symbolFor(idx) {
  return SYMBOLS[idx % SYMBOLS.length];
}

function renderCell(cell, r, c) {
  const idx = data[r][c];
  if (idx == null) {
    cell.style.background = "#fff";
    cell.textContent = "";
  } else {
    const hex = DMC[idx][2];
    cell.style.background = hex;
    if (showSym) {
      cell.textContent = symbolFor(idx);
      cell.style.color = contrastText(hex);
    } else {
      cell.textContent = "";
    }
  }
}

function paintAll() {
  const cells = gridEl.children;
  for (const cell of cells) {
    renderCell(cell, +cell.dataset.r, +cell.dataset.c);
  }
}

function updateCell(r, c) {
  const cell = gridEl.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
  if (cell) renderCell(cell, r, c);
}

/* ---------- Painting ---------- */
let painting = false;

function applyTool(r, c) {
  if (tool === "erase") {
    data[r][c] = null;
  } else if (tool === "paint") {
    if (!current) return;
    data[r][c] = current.__idx;
  } else if (tool === "fill") {
    if (!current) return;
    floodFill(r, c, data[r][c], current.__idx);
    paintAll();
    updateLegend();
    return;
  }
  updateCell(r, c);
  updateLegend();
}

function floodFill(r, c, target, replacement) {
  if (target === replacement) return;
  const stack = [[r, c]];
  while (stack.length) {
    const [cr, cc] = stack.pop();
    if (cr < 0 || cc < 0 || cr >= rows || cc >= cols) continue;
    if (data[cr][cc] !== target) continue;
    data[cr][cc] = replacement;
    stack.push([cr+1,cc],[cr-1,cc],[cr,cc+1],[cr,cc-1]);
  }
}

gridEl.addEventListener("pointerdown", e => {
  const cell = e.target.closest(".cell");
  if (!cell) return;
  const r = +cell.dataset.r, c = +cell.dataset.c;

  if (pasteMode) { commitPaste(r, c); return; }

  if (tool === "select") {
    selecting = true;
    selAnchor = { r, c };
    gridEl.setPointerCapture(e.pointerId);
    setSelection(r, c, r, c);
    return;
  }

  // one history entry per stroke (skip no-op paint/fill with no colour selected)
  if (tool === "erase" || current) pushHistory();
  // record a colour as "recently used" only when it's actually applied to the canvas
  if ((tool === "paint" || tool === "fill") && current) addRecent(current.__idx);
  painting = true;
  gridEl.setPointerCapture(e.pointerId);
  applyTool(r, c);
});
gridEl.addEventListener("pointermove", e => {
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const cell = el && el.closest ? el.closest(".cell") : null;
  const inGrid = cell && gridEl.contains(cell);

  if (pasteMode) {
    if (inGrid) showPasteAt(+cell.dataset.r, +cell.dataset.c);
    return;
  }
  if (selecting) {
    if (inGrid) setSelection(selAnchor.r, selAnchor.c, +cell.dataset.r, +cell.dataset.c);
    return;
  }
  if (!painting || tool === "fill") return;
  if (inGrid) applyTool(+cell.dataset.r, +cell.dataset.c);
});
window.addEventListener("pointerup", () => { painting = false; selecting = false; });

/* ---------- Select / copy / paste ---------- */
let selection = null;              // {r0,c0,r1,c1}
let selAnchor = null, selecting = false;
let clipboard = null;              // 2D array of DMC indices / null
let pasteMode = false, previewCells = [];

function getCell(r, c) { return gridEl.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`); }
function setHint(t) { document.getElementById("hint").textContent = t || ""; }

function renderSelection() {
  gridEl.querySelectorAll(".cell.sel-region").forEach(el => el.classList.remove("sel-region"));
  if (!selection) return;
  const { r0, c0, r1, c1 } = selection;
  for (let r = r0; r <= r1; r++)
    for (let c = c0; c <= c1; c++) {
      const cell = getCell(r, c);
      if (cell) cell.classList.add("sel-region");
    }
}
function setSelection(ar, ac, br, bc) {
  selection = { r0: Math.min(ar, br), c0: Math.min(ac, bc), r1: Math.max(ar, br), c1: Math.max(ac, bc) };
  renderSelection();
  document.getElementById("copy").disabled = false;
  const w = selection.c1 - selection.c0 + 1, h = selection.r1 - selection.r0 + 1;
  setHint(`Selected ${w} × ${h}. Copy with ⌘/Ctrl+C.`);
}
function clearSelection() {
  selection = null;
  renderSelection();
  document.getElementById("copy").disabled = true;
}

function copySelection() {
  if (!selection) return;
  const { r0, c0, r1, c1 } = selection;
  clipboard = [];
  for (let r = r0; r <= r1; r++) {
    const row = [];
    for (let c = c0; c <= c1; c++) row.push(data[r][c]);
    clipboard.push(row);
  }
  document.getElementById("paste").disabled = false;
  setHint(`Copied ${c1 - c0 + 1} × ${r1 - r0 + 1}. Click Paste, then click a cell to place it.`);
}

function enterPasteMode() {
  if (!clipboard) return;
  clearSelection();
  pasteMode = true;
  document.getElementById("paste").classList.add("active");
  setHint("Paste mode: move over the grid, click to place. Esc to cancel.");
}
function exitPasteMode() {
  if (!pasteMode) return;
  clearPreview();
  pasteMode = false;
  document.getElementById("paste").classList.remove("active");
  setHint("");
}
function clearPreview() {
  previewCells.forEach(({ r, c }) => {
    const cell = getCell(r, c);
    if (cell) { cell.style.outline = ""; cell.style.outlineOffset = ""; renderCell(cell, r, c); }
  });
  previewCells = [];
}
function showPasteAt(r0, c0) {
  clearPreview();
  const cb = clipboard;
  for (let i = 0; i < cb.length; i++)
    for (let j = 0; j < cb[i].length; j++) {
      const r = r0 + i, c = c0 + j;
      if (r < 0 || c < 0 || r >= rows || c >= cols) continue;
      const cell = getCell(r, c);
      if (!cell) continue;
      const idx = cb[i][j];
      cell.style.background = idx == null ? "#fff" : DMC[idx][2];
      cell.textContent = (showSym && idx != null) ? symbolFor(idx) : "";
      cell.style.outline = "1px dashed rgba(0,0,0,.55)";
      cell.style.outlineOffset = "-1px";
      previewCells.push({ r, c });
    }
}
function commitPaste(r0, c0) {
  if (!clipboard) return;
  pushHistory();
  const cb = clipboard;
  for (let i = 0; i < cb.length; i++)
    for (let j = 0; j < cb[i].length; j++) {
      const r = r0 + i, c = c0 + j;
      if (r < 0 || c < 0 || r >= rows || c >= cols) continue;
      data[r][c] = cb[i][j];
    }
  clearPreview();
  new Set(cb.flat().filter(x => x != null)).forEach(idx => addRecent(idx));
  pasteMode = false;
  document.getElementById("paste").classList.remove("active");
  paintAll();
  updateLegend();
  setHint("Pasted ✓ — click Paste to place another copy.");
}

document.getElementById("copy").onclick = copySelection;
document.getElementById("paste").onclick = enterPasteMode;

/* ---------- Palette ---------- */
const paletteEl = document.getElementById("palette");
function buildPalette(filter) {
  paletteEl.innerHTML = "";
  const f = (filter || "").toLowerCase().trim();
  DMC.forEach((d, i) => {
    const [code, name, hex] = d;
    if (f && !(code.toLowerCase().includes(f) || name.toLowerCase().includes(f))) return;
    const sw = document.createElement("div");
    sw.className = "swatch";
    sw.style.background = hex;
    sw.title = `DMC ${code} — ${name}`;
    sw.textContent = code.length <= 4 ? code : "";
    sw.style.color = contrastText(hex);
    if (current && current.__idx === i) sw.classList.add("sel");
    sw.addEventListener("click", () => selectColor(i));
    paletteEl.appendChild(sw);
  });
}

function selectColor(i) {
  current = { code: DMC[i][0], name: DMC[i][1], hex: DMC[i][2], __idx: i };
  if (tool === "erase") setTool("paint");
  document.getElementById("currentChip").style.background = current.hex;
  document.getElementById("currentLabel").textContent = `DMC ${current.code} — ${current.name}`;
  document.querySelectorAll(".swatch.sel").forEach(s => s.classList.remove("sel"));
  buildPalette(document.getElementById("search").value);
}

/* ---------- Recently used ---------- */
const RECENT_KEY = "dmc-recent", RECENT_MAX = 12;
let recent = [];
try { recent = JSON.parse(localStorage.getItem(RECENT_KEY)) || []; } catch (e) { recent = []; }

function addRecent(i) {
  recent = [i, ...recent.filter(x => x !== i)].slice(0, RECENT_MAX);
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(recent)); } catch (e) {}
  buildRecent();
}
function buildRecent() {
  const wrap = document.getElementById("recentWrap");
  const el = document.getElementById("recent");
  el.innerHTML = "";
  if (!recent.length) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";
  recent.forEach(i => {
    const [code, name, hex] = DMC[i];
    const sw = document.createElement("div");
    sw.className = "swatch";
    sw.style.background = hex;
    sw.style.color = contrastText(hex);
    sw.title = `DMC ${code} — ${name}`;
    sw.textContent = code.length <= 4 ? code : "";
    if (current && current.__idx === i) sw.classList.add("sel");
    sw.addEventListener("click", () => selectColor(i));
    el.appendChild(sw);
  });
}

/* ---------- Legend (for print) ---------- */
function updateLegend() {
  const used = new Set();
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (data[r][c] != null) used.add(data[r][c]);

  const legend = document.getElementById("legend");
  if (!used.size) { legend.innerHTML = ""; return; }
  const items = [...used].sort((a,b) => a-b);
  let html = "<h2>Colour key</h2><table>";
  items.forEach(i => {
    const [code, name, hex] = DMC[i];
    html += `<tr><td><span class="sw" style="background:${hex}"></span></td>`
          + `<td>${showSym ? symbolFor(i) : ""}</td>`
          + `<td>DMC ${code}</td><td>${name}</td></tr>`;
  });
  html += "</table>";
  legend.innerHTML = html;
}

/* ---------- Tools UI ---------- */
function setTool(t) {
  exitPasteMode();
  if (t !== "select") clearSelection();
  tool = t;
  ["tool-paint","tool-erase","tool-fill","tool-select"].forEach(id =>
    document.getElementById(id).classList.remove("active"));
  const btn = document.getElementById("tool-" + t);
  if (btn) btn.classList.add("active");
  setHint(t === "select" ? "Drag on the canvas to select a rectangle." : "");
}
document.getElementById("tool-paint").onclick = () => setTool("paint");
document.getElementById("tool-erase").onclick = () => setTool("erase");
document.getElementById("tool-fill").onclick  = () => setTool("fill");
document.getElementById("tool-select").onclick = () => setTool("select");

/* ---------- Controls ---------- */
document.getElementById("resize").onclick = () => {
  pushHistory();
  cols = clamp(+document.getElementById("cols").value, 1, 120);
  rows = clamp(+document.getElementById("rows").value, 1, 120);
  cellSize = clamp(+document.getElementById("cellsize").value, 6, 40);
  initData(true);
  buildGrid();
  updateFinished();
  updateLegend();
};
document.getElementById("clear").onclick = () => {
  if (!confirm("Clear the whole pattern?")) return;
  pushHistory();
  initData(false);
  paintAll();
  updateLegend();
};
document.getElementById("showsym").onchange = e => {
  showSym = e.target.checked;
  paintAll();
  updateLegend();
};
document.getElementById("cellsize").onchange = e => {
  cellSize = clamp(+e.target.value, 6, 40);
  buildGrid();
};
document.getElementById("search").oninput = e => buildPalette(e.target.value);

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v || lo)); }

/* ---------- Fabric count / finished size ---------- */
function effectiveCount() {
  // stitching "over 2" threads halves the effective stitches per inch
  return count / over;
}
function finishedText() {
  const ec = effectiveCount();
  const wIn = cols / ec, hIn = rows / ec;
  const wCm = wIn * 2.54, hCm = hIn * 2.54;
  return `Finished on ${count} ct${over === 2 ? " over 2" : ""}: `
       + `${wIn.toFixed(1)} × ${hIn.toFixed(1)} in  (${wCm.toFixed(1)} × ${hCm.toFixed(1)} cm)`;
}
function updateFinished() {
  document.getElementById("finished").textContent = finishedText();
}
document.getElementById("count").onchange = e => { count = +e.target.value; updateFinished(); };
document.getElementById("over").onchange  = e => { over  = +e.target.value; updateFinished(); };

/* ---------- Print ---------- */
document.getElementById("print").onclick = () => {
  exitPasteMode();
  clearSelection();
  const t = document.getElementById("title").value || "DMC Pattern";
  document.getElementById("printTitle").textContent =
    `${t}  ·  ${cols} × ${rows} stitches  ·  ${finishedText()}`;
  updateLegend();
  window.print();
};

/* ---------- Save / Load ---------- */
document.getElementById("save").onclick = () => {
  const payload = { cols, rows, cellSize, count, over, showSym, title: document.getElementById("title").value, data };
  const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (payload.title || "dmc-pattern").replace(/\s+/g,"-") + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById("load").onclick = () => document.getElementById("loadfile").click();
document.getElementById("loadfile").onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const p = JSON.parse(reader.result);
      cols = p.cols; rows = p.rows; cellSize = p.cellSize || 16;
      count = p.count || 14; over = p.over || 1;
      showSym = !!p.showSym; data = p.data;
      document.getElementById("cols").value = cols;
      document.getElementById("rows").value = rows;
      document.getElementById("cellsize").value = cellSize;
      document.getElementById("count").value = count;
      document.getElementById("over").value = over;
      document.getElementById("showsym").checked = showSym;
      document.getElementById("title").value = p.title || "";
      resetHistory();
      buildGrid();
      updateFinished();
      updateLegend();
    } catch (err) { alert("Could not load file: " + err.message); }
  };
  reader.readAsText(file);
  e.target.value = "";
};

/* ---------- Init ---------- */
initData(false);
buildGrid();
updateFinished();
selectColor(DMC.findIndex(d => d[0] === "310")); // black default
buildRecent();
buildPalette("");
</script>
</body>
</html>
